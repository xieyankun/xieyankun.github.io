<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="css/reset.css"> -->
    <style>
    *{
        margin: 0;
        padding: 0;
    }
    body {
        width: 100%;
        height: 100vh;
        background: -webkit-gradient(linear, 0 0, 0 100%, color-stop(0.5, #eff2eb), color-stop(0.5, transparent)), -webkit-gradient(linear, 0 0, 0 100%, color-stop(1, #ffffff), color-stop(1, transparent))
    }
    
    .lina {
        width: 100%;
        height: 100%;
        background: url('lina/bg1.jpg') no-repeat center center;
        background-size: 100%;
        z-index: 999;
        overflow: hidden;
    }
    
    .heat {
        width: 36%;
        position: absolute;
        margin: auto;
        left: 0;
        top: 0;
        bottom: 0;
        right: 0;
        animation: pulse 1s infinite;
        -webkit-animation: pulse 1s infinite;
        z-index: 9999;
    }
    .leaf{
		width: 100px;
		height: 110px;
		text-align: center;
		line-height: 110px;
		color: #fff;
		font-size: 18px;
        /*opacity: 0;*/
    }
    .leaf1{
		background: url(lina/nav1.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 27%;
		left: 26%;
        animation: zoomIn 1s forwards;
        -webkit-animation: zoomIn 1s forwards;
    }
    .leaf2{
		background: url(lina/nav2.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 43%;
    	left: 13%;
    	line-height: 84px;
        animation: zoomIn 1s 0.5s forwards;
        -webkit-animation: zoomIn 1s 0.5s forwards;
    }
    .leaf3{
		background: url(lina/nav3.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 54%;
		left: 26%;
        animation: zoomIn 1s 1s forwards;
        -webkit-animation: zoomIn 1s 1s forwards;
    }
    .leaf4{
		background: url(lina/nav4.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 54%;
		left: 52%;
        animation: zoomIn 1s 1.5s forwards;
        -webkit-animation: zoomIn 1s 1.5s forwards;
    }
    .leaf5{
		background: url(lina/nav5.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 43%;
		left: 64%;
		line-height: 84px;
        animation: zoomIn 1s 2s forwards;
        -webkit-animation: zoomIn 1s 2s forwards;
    }
    .leaf6{
		background: url(lina/nav6.png) no-repeat;
		background-size: 100%;
		position: absolute;
		top: 27%;
		left: 52%;
        animation: zoomIn 1s 2.5s forwards;
        -webkit-animation: zoomIn 1s 2.5s forwards;
    }
    
    .box {
        width: 50px;
        height: 50px;
        background-image: 
        	-webkit-gradient(linear, 0 0, 0 100%, color-stop(.5, #000), color-stop(.5, transparent)), 
        	-webkit-gradient(linear, 0 0, 0 100%, color-stop(1, red), color-stop(1, transparent))
    }
    
    @keyframes pulse {
        from {
            -webkit-transform: scale3d(1, 1, 1);
            transform: scale3d(1, 1, 1);
        }
        50% {
            -webkit-transform: scale3d(1.05, 1.05, 1.05);
            transform: scale3d(1.05, 1.05, 1.05);
        }
        to {
            -webkit-transform: scale3d(1, 1, 1);
            transform: scale3d(1, 1, 1);
        }
    }
    @-webkit-keyframes pulse {
        from {
            -webkit-transform: scale3d(1, 1, 1);
            transform: scale3d(1, 1, 1);
        }
        50% {
            -webkit-transform: scale3d(1.05, 1.05, 1.05);
            transform: scale3d(1.05, 1.05, 1.05);
        }
        to {
            -webkit-transform: scale3d(1, 1, 1);
            transform: scale3d(1, 1, 1);
        }
    }
    @keyframes zoomIn {
        from {
            opacity: 0;
            -webkit-transform: scale3d(.3, .3, .3);
            transform: scale3d(.3, .3, .3);
        }

        50% {
            opacity: 1;
        }
    }
    @-webkit-keyframes zoomIn {
        from {
            opacity: 0;
            transform: scale3d(.3, .3, .3);
            transform: scale3d(.3, .3, .3);
        }

        100% {
            opacity: 1;
        }
    }
    .title{
        text-align: center;
        font-size: 24px;
        padding: 48px;
    }
    .title h1{
        font-size: 24px;
    }
    </style>
</head>

<body>
    <!-- <div class="box"></div> -->
    <div class="lina">
        <div class="title">
            <h1>娜娜永远的小叮当</h1>
        </div>
        <img class="heat" src="lina/logo1.png" alt="">
        <div class="leaf leaf1">
        	<p>相识</p>
        </div>
        <div class="leaf leaf2">
        	<p>相知</p>
        </div>
        <div class="leaf leaf3">
        	<p>相爱</p>
        </div>
        <div class="leaf leaf4">
        	<p>五月天</p>
        </div>
        <div class="leaf leaf5">
        	<p>小叮当</p>
        </div>
        <div class="leaf leaf6">
        	<p>沙漏</p>
        </div>
    </div>
</body>

</html>
